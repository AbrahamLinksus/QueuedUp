<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QueuedUp — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: #F5F1E8;
      color: #111111;
      font-family: system-ui, sans-serif;
      padding: 2rem;
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      overflow: hidden;
      border: 2px solid #111111;
    }

    .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    p {
      color: #6b6b6b;
      max-width: 280px;
      line-height: 1.5;
    }

    button {
      margin-top: 0.5rem;
      padding: 0.625rem 1.5rem;
      background: #111111;
      color: #F5F1E8;
      border: 2px solid #111111;
      border-radius: 9999px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="icon">
    <img src="/icon-192.png" alt="QueuedUp" />
  </div>
  <h1>You're offline</h1>
  <p>No connection right now. Come back when you're online to keep reviewing.</p>
  <button onclick="location.reload()">Try again</button>
</body>
</html>
